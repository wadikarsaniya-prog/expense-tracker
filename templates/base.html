<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ cache_buster }}">
</head>
<body>

    <div class="app-container">
        {% block content %}{% endblock %}   
    </div>

    <nav class="bottom-nav">
        <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
            <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
        </a>
        <a href="/add" class="nav-item {% if request.path == '/add' %}active{% endif %}">
            <span class="nav-icon">➕</span><span class="nav-label">Add</span>
        </a>
        <a href="/expenses" class="nav-item {% if request.path == '/expenses' %}active{% endif %}">
            <span class="nav-icon">📋</span><span class="nav-label">History</span>
        </a>
        <a href="/analytics" class="nav-item {% if request.path == '/analytics' %}active{% endif %}">
            <span class="nav-icon">📊</span><span class="nav-label">Stats</span>
        </a>
        <a href="/trends" class="nav-item {% if request.path == '/trends' %}active{% endif %}">
            <span class="nav-icon">📈</span><span class="nav-label">Trends</span>
        </a>
    </nav>

</body>
</html>
