<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ cache_buster }}">
</head>
<body>

    <div class="app-container" style="display: flex; flex-direction: column;">

    {% if current_user.is_authenticated %}
        <header style="width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 0px; border-bottom: 1px solid #333; margin-bottom: 20px;">
            <span style="font-size: 1.1rem; font-weight: bold; color: #fff;">💰 My Budget</span>
            <span style="font-size: 0.9rem; font-weight: 600; color: #007bff; background: #e6f0ff; padding: 4px 12px; border-radius: 20px;">
                Hi, {{ current_user.username }}
            </span>
        </header>
        {% endif %}

        {% block content %}{% endblock %}   
    </div>

    {% if current_user.is_authenticated %}
    <nav class="bottom-nav">
        <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
            <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
        </a>
        <a href="/add" class="nav-item {% if request.path == '/add' %}active{% endif %}">
            <span class="nav-icon">➕</span><span class="nav-label">Add</span>
        </a>
        <a href="/expenses" class="nav-item {% if request.path == '/expenses' %}active{% endif %}">
            <span class="nav-icon">📋</span><span class="nav-label">History</span>
        </a>
        <a href="/analytics" class="nav-item {% if request.path == '/analytics' %}active{% endif %}">
            <span class="nav-icon">📊</span><span class="nav-label">Stats</span>
        </a>
        <a href="{{ url_for('auth.logout') }}" class="nav-item" style="color: #dc3545;">
            <span class="nav-icon">🚪</span><span class="nav-label">Logout</span>
        </a>
    </nav>
    {% endif %}

</body>
</html>
