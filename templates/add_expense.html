{% extends 'base.html' %}

{% block content %}
<header class="header-main">
    <div>
        <h1>Log Expense</h1>
        <p class="subtitle">Add a new transaction log</p>
    </div>
    <a href="/" class="view-all-link" style="font-weight: 600;">Cancel</a>
</header>

<section class="main-card">
    
    {% if error %}
        <div style="background-color: rgba(239, 68, 68, 0.15); color: #cf6679; border: 1px solid #cf6679; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 14px;">
            ⚠️ {{ error }}
        </div>
    {% endif %}

    <form action="/add" method="POST">

        <div class="form-group">
            <label class="form-label" for="date">Transaction Date</label>
            <input 
                type="date" 
                id="date" 
                name="date" 
                class="form-input form-input-date" 
                required
            >
        </div>
        
        <div class="form-group">
            <label class="form-label" for="amount">Amount Spent</label>
            <div class="input-prefix-wrapper">
                <span class="input-currency-symbol">₹</span>
                <input 
                    type="number" 
                    step="0.01" 
                    id="amount"
                    name="amount" 
                    class="form-input form-input-prefixed" 
                    placeholder="0.00" 
                    required 
                    autofocus
                >
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="category">Category Selection</label>
            <select id="category" name="category" class="form-select" required>
                <option value="" disabled selected>Select a category...</option>
                {% for cat in categories %}
                    <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="form-label" for="description">Description / Memo</label>
            <input 
                type="text" 
                id="description"
                name="description" 
                class="form-input" 
                placeholder="e.g. Weekly Groceries, Dinner, Bus Fare"
            >
        </div>

        <button type="submit" class="btn-submit-full">Save Transaction</button>
    </form>
</section>
{% endblock %}
